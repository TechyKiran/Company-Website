<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Registration</title>
<link rel="stylesheet" href="addemp.css">
</head>
<body>

<form action="Addemp" method="post">

    <div class="row">
        <div class="field">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter full name" required>
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email" required>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="Enter phone number" required>
        </div>

        <div class="field">
            <label>Location</label>
            <input type="text" name="location" placeholder="Enter location">
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>10th Percentage</label>
            <input type="number" step="0.01" name="tenth" placeholder="e.g. 85.5">
        </div>

        <div class="field">
            <label>12th Percentage</label>
            <input type="number" step="0.01" name="twelfth" placeholder="e.g. 82.0">
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Graduation Percentage</label>
            <input type="number" step="0.01" name="graduation" placeholder="e.g. 78.9">
        </div>

        <div class="field">
            <label>Experience (Years)</label>
            <input type="number" step="0.1" name="experience" placeholder="e.g. 1.5">
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Department</label>
            <select name="department">
                <option value="">Select Department</option>
                <option>IT</option>
                <option>HR</option>
                <option>Finance</option>
                <option>Marketing</option>
                <option>Operations</option>
                <option>Sales</option>
            </select>
        </div>

        <div class="field">
            <label>Role</label>
            <input type="text" name="role" placeholder="e.g. Java Developer">
        </div>

        <div class="field">
            <label>Salary</label>
            <input type="number" name="salary" placeholder="e.g. 400000">
        </div>
    </div>

    <div class="btn">
        <button type="submit">Add Employee</button>
    </div>

</form>

</body>
</html>
